name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: Run tests
        run: make test

  build-and-release:
    name: Build and Release
    needs: verify
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: realm
            asset_name: realm-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary_name: realm.exe
            asset_name: realm-windows-amd64
          - os: macos-latest
            goos: darwin
            goarch: universal
            binary_name: realm
            asset_name: realm-darwin-universal

    env:
      LDFLAGS: >-
        -X 'github.com/bitomia/realm/common/config.BuildGitCommit=${{ github.sha }}'
        -X 'github.com/bitomia/realm/common/config.Version=${{ github.ref_name }}'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        if: matrix.goarch != 'universal'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p bin
          go build -C ./cmd -o ../bin/${{ matrix.binary_name }} -mod=readonly -buildvcs=false -ldflags="$LDFLAGS"

      - name: Build universal binary (Darwin)
        if: matrix.goarch == 'universal'
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p bin
          GOOS=darwin GOARCH=amd64 go build -C ./cmd -o ../bin/realm-amd64 -mod=readonly -buildvcs=false -ldflags="$LDFLAGS"
          GOOS=darwin GOARCH=arm64 go build -C ./cmd -o ../bin/realm-arm64 -mod=readonly -buildvcs=false -ldflags="$LDFLAGS"
          lipo -create -output bin/realm bin/realm-amd64 bin/realm-arm64

      - name: Compress binary (Unix)
        if: matrix.goos != 'windows'
        run: |
          cd bin
          tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.binary_name }}
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Compress binary (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd bin
          Compress-Archive -Path ${{ matrix.binary_name }} -DestinationPath ${{ matrix.asset_name }}.zip
          (Get-FileHash ${{ matrix.asset_name }}.zip -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.asset_name }}.zip" | Out-File -FilePath ${{ matrix.asset_name }}.zip.sha256 -Encoding ASCII

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/${{ matrix.asset_name }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_REALM_RELEASE_TOKEN }}
