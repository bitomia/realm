- name: Ensure bookworm-backports is enabled (Debian 12 only)
  ansible.builtin.apt_repository:
    repo: "deb http://deb.debian.org/debian bookworm-backports main contrib non-free-firmware"
    state: present
    filename: bookworm-backports
  when:
    - ansible_distribution == "Debian"
    - ansible_distribution_major_version == "12"
  become: true

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: yes
  become: true

- name: PKGS > Install required packages
  ansible.builtin.package:
    name:
      - git
      - curl
      - net-tools
      - etcd-client
    state: present
  become: true
